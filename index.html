<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DMU P4 カンペ</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            width: 100vw; height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            box-sizing: border-box;
            padding: 2px 6px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header-area {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 5px;
            margin-bottom: 5px;
            position: sticky;
            top: 0;
            background: #0f0f0f;
            z-index: 100;
            height: 40px;
            gap: 6px;
        }
        .title {
            font-size: 15px;
            color: #ffcc00;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
            min-width: 0;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            margin-left: auto;
        }
        .lang-btn {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
        }
        .lang-btn.active {
            background: #ffcc00;
            color: #000;
            border-color: #fff;
        }
        .reset-btn {
            background: #ff3333;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ── Main grid ── */
        #main {
            display: grid;
            grid-template-columns: 1fr 8px 1fr;
            flex: 1;
        }

        /* ── Answer column ── */
        .p4-sec {
            font-size: 9px;
            font-weight: bold;
            color: #5BC8F5;
            margin: 2px 0 1px 4px;
        }
        .p4-ans-row {
            display: flex;
            align-items: center;
            margin: 2px 0;
        }
        .p4-num {
            width: 20px;
            text-align: right;
            font-size: 10px;
            font-weight: bold;
            color: #666;
            flex-shrink: 0;
        }
        .p4-num.fire-num  { color: #FF6B35; }
        .p4-num.water-num { color: #4DADFF; }
        .p4-ans-box {
            flex: 1;
            background: #1c1c1c;
            border: 1px solid #444;
            border-radius: 3px;
            height: 40px;
            margin-left: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .p4-ans-text {
            font-size: 14px;
            font-weight: bold;
            color: #3a3a3a;
            text-align: center;
        }
        .p4-ans-text.has-val { color: #FFCC00; }
        .p4-div { height: 1px; background: #333; margin: 3px 4px; }

        /* ── Button column ── */
        .p4-btn-col { padding: 0 2px; }
        .p4-btn-sec {
            font-size: 9px;
            font-weight: bold;
            color: #5BC8F5;
            text-align: center;
            margin: 2px 0 1px 0;
        }
        .p4-btn-row {
            display: flex;
            gap: 4px;
            margin: 3px 0;
        }
        .p4-btn {
            flex: 1;
            height: 40px;
            border: 1px solid #444;
            background: #282828;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: white;
        }
        .p4-btn .dot-blue {
            width: 26px; height: 26px;
            background: #4DADFF;
            border-radius: 50%;
        }
        .p4-btn .q-red {
            font-size: 22px;
            font-weight: 900;
            color: #FF4D4D;
        }
        .p4-btn .btn-img {
            height: 30px;
            width: auto;
            object-fit: contain;
        }
        .p4-half-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin: 3px 0;
        }

        /* Active states */
        .p4-btn[data-btn="A"].active { background: #1A4A7A; }
        .p4-btn[data-btn="B"].active { background: #5A2525; }
        .p4-btn[data-btn="C"].active { background: #4DADFF; color: #000; }
        .p4-btn[data-btn="D"].active { background: #4DADFF; color: #000; }
        .p4-btn[data-btn="E"].active { background: #4DADFF; }
        .p4-btn[data-btn="F"].active { background: #1A4A7A; }
        .p4-btn[data-btn="G"].active { background: #5A2525; }
        .p4-btn[data-btn="H"].active { background: #5A2525; }
        .p4-btn[data-btn="I"].active { background: #1A4A7A; }
        .p4-btn[data-btn="J"].active { background: #1A4A7A; }
        .p4-btn[data-btn="K"].active { background: #5A2525; }
        .p4-btn[data-btn="L"].active { background: #4DADFF; }
        .p4-btn[data-btn="M"].active { background: #1A4A7A; }
        .p4-btn[data-btn="N"].active { background: #5A2525; }
        .p4-btn[data-btn="O"].active { background: #1A4A7A; }
        .p4-btn[data-btn="P"].active { background: #5A2525; }
        .p4-btn[data-btn="Q"].active { background: #1A4A7A; }
        .p4-btn[data-btn="R"].active { background: #5A2525; }

        /* ── Footer ── */
        .footer-area {
            margin-top: 15px;
            padding: 15px 0;
            font-size: 10px;
            color: #666;
            text-align: center;
            border-top: 1px solid #222;
        }
        .footer-area a { color: #888; text-decoration: underline; }
    </style>
</head>

    <script>
    const i18n = {
        zh: {
            "title": "🤡 絕妖星 P4",
            "p4-sec-bomb": "炸彈", "p4-sec-early": "早debuff", "p4-sec-late": "晚debuff",
            "p4-sec-magic": "魔法放出", "p4-sec-gc1": "GC1", "p4-sec-waterfire1": "水火1",
            "p4-sec-gc2": "GC2", "p4-sec-waterfire2": "水火2",
            "p4-sec-thunder": "雷直線", "p4-sec-ice": "冰扇形",
            "p4-btn-c": "早", "p4-btn-d": "晚", "p4-num-4": "火", "p4-num-7": "水",
            "p4-stop": "不要動", "p4-move": "動起來",
            "p4-thunder-out": "雷散開", "p4-water-out": "水散開",
            "p4-lookaway": "不要看", "p4-lookat": "要看",
            "p4-out": "鋼鐵", "p4-in": "月環",
            "p4-avoid-both": "都不要踩", "p4-cone": "踩扇形", "p4-line": "踩直線", "p4-both": "都踩"
        },
        jp: {
            "title": "🤡 絶妖星 P4",
            "p4-sec-bomb": "爆弾", "p4-sec-early": "早デバフ", "p4-sec-late": "遅デバフ",
            "p4-sec-magic": "マジックアウト", "p4-sec-gc1": "GC1", "p4-sec-waterfire1": "水炎1",
            "p4-sec-gc2": "GC2", "p4-sec-waterfire2": "水炎2",
            "p4-sec-thunder": "直線", "p4-sec-ice": "扇",
            "p4-btn-c": "早", "p4-btn-d": "遅", "p4-num-4": "炎", "p4-num-7": "水",
            "p4-stop": "止まる", "p4-move": "動き続ける",
            "p4-thunder-out": "雷散開", "p4-water-out": "水散開",
            "p4-lookaway": "見ない", "p4-lookat": "見る",
            "p4-out": "タケノコ", "p4-in": "ドーナツ",
            "p4-avoid-both": "踏まない", "p4-cone": "扇踏む", "p4-line": "線踏む", "p4-both": "両方踏む"
        },
        en: {
            "title": "🤡 DMU P4",
            "p4-sec-bomb": "Bomb", "p4-sec-early": "Short Debuffs", "p4-sec-late": "Long Debuffs",
            "p4-sec-magic": "Mana Release", "p4-sec-gc1": "GC1", "p4-sec-waterfire1": "Entropy/Fluid 1",
            "p4-sec-gc2": "GC2", "p4-sec-waterfire2": "Entropy/Fluid 2",
            "p4-sec-thunder": "Line", "p4-sec-ice": "Cone",
            "p4-btn-c": "S", "p4-btn-d": "L", "p4-num-4": "4.", "p4-num-7": "7.",
            "p4-stop": "STOP", "p4-move": "MOVE",
            "p4-thunder-out": "Lightning Out", "p4-water-out": "Water Out",
            "p4-lookaway": "Look Away", "p4-lookat": "Look At",
            "p4-out": "Out", "p4-in": "In",
            "p4-avoid-both": "Avoid Both", "p4-cone": "Stand in Cone", "p4-line": "Stand in Line", "p4-both": "Both"
        }
    };

    let currentLang = 'zh';

    function changeLang(lang) {
        currentLang = lang;
        document.body.className = 'lang-' + lang;
        document.querySelectorAll('.lang-btn').forEach(btn =>
            btn.classList.toggle('active', btn.innerText.toLowerCase() === lang));
        const t = i18n[lang];
        document.getElementById('ui-title').innerText = t['title'];
        document.getElementById('btnC').innerText = t['p4-btn-c'];
        document.getElementById('btnD').innerText = t['p4-btn-d'];
        document.getElementById('num4label').innerText = t['p4-num-4'];
        document.getElementById('num7label').innerText = t['p4-num-7'];
        document.querySelectorAll('[data-p4key]').forEach(el => {
            const v = t[el.dataset.p4key];
            if (v !== undefined) el.innerText = v;
        });
        p4Recalculate();
    }

    /* ── P3 Logic ── */
    const MUTEX_GROUPS = [
        ['A','B'],['C','D'],['F','G'],['H','I'],['J','K'],['E','L'],['M','N']
    ];
    const GROUP_OP = ['O','P'];
    const GROUP_QR = ['Q','R'];

    const p4State = {
        A:false,B:false,C:false,D:false,E:false,F:false,G:false,
        H:false,I:false,J:false,K:false,L:false,M:false,N:false,
        O:true, P:false, Q:true, R:false
    };

    function p4Click(name) {
        if (GROUP_OP.includes(name) || GROUP_QR.includes(name)) {
            handleDefaultGroup(name, GROUP_OP.includes(name) ? GROUP_OP : GROUP_QR);
        } else {
            if (p4State[name]) { p4State[name] = false; }
            else {
                for (const grp of MUTEX_GROUPS)
                    if (grp.includes(name)) grp.forEach(g => p4State[g] = false);
                p4State[name] = true;
            }
        }
        p4Recalculate();
        p4Render();
    }

    function handleDefaultGroup(name, group) {
        if (p4State[name]) {
            if (name === group[0]) return;
            p4State[name] = false;
            p4State[group[0]] = true;
        } else {
            group.forEach(g => p4State[g] = false);
            p4State[name] = true;
        }
    }

    const is = n => p4State[n];
    const T  = k => (i18n[currentLang] || i18n.zh)[k] || '';

    function p4Recalculate() {
        const ans = Array(9).fill('');
        if      (is('E')&&is('A')) ans[1]=T('p4-stop');
        else if (is('E')&&is('B')) ans[1]=T('p4-move');
        else if (is('L')&&is('J')) ans[1]=T('p4-stop');
        else if (is('L')&&is('K')) ans[1]=T('p4-move');

        if      (is('C')&&is('A')) ans[2]=T('p4-thunder-out');
        else if (is('C')&&is('B')) ans[2]=T('p4-water-out');
        else if (is('D')&&is('J')) ans[2]=T('p4-thunder-out');
        else if (is('D')&&is('K')) ans[2]=T('p4-water-out');

        if      (is('A')) ans[3]=T('p4-lookaway');
        else if (is('B')) ans[3]=T('p4-lookat');

        if      (is('H')&&is('F')) ans[4]=T('p4-out');
        else if (is('H')&&is('G')) ans[4]=T('p4-in');
        else if (is('M')&&is('I')) ans[4]=T('p4-out');
        else if (is('N')&&is('I')) ans[4]=T('p4-in');

        if      (is('D')&&is('A')) ans[5]=T('p4-thunder-out');
        else if (is('D')&&is('B')) ans[5]=T('p4-water-out');
        else if (is('C')&&is('J')) ans[5]=T('p4-thunder-out');
        else if (is('C')&&is('K')) ans[5]=T('p4-water-out');

        if      (is('J')) ans[6]=T('p4-lookaway');
        else if (is('K')) ans[6]=T('p4-lookat');

        if      (is('I')&&is('F')) ans[7]=T('p4-in');
        else if (is('I')&&is('G')) ans[7]=T('p4-out');
        else if (is('M')&&is('H')) ans[7]=T('p4-in');
        else if (is('N')&&is('H')) ans[7]=T('p4-out');

        if      (is('O')&&is('Q')) ans[8]=T('p4-avoid-both');
        else if (is('O')&&is('R')) ans[8]=T('p4-cone');
        else if (is('P')&&is('Q')) ans[8]=T('p4-line');
        else if (is('P')&&is('R')) ans[8]=T('p4-both');

        for (let i = 1; i <= 8; i++) {
            const el = document.getElementById('ans'+i);
            if (el) { el.innerText = ans[i]; el.classList.toggle('has-val', ans[i] !== ''); }
        }
    }

    function p4Render() {
        document.querySelectorAll('.p4-btn[data-btn]').forEach(btn =>
            btn.classList.toggle('active', !!p4State[btn.dataset.btn]));
    }

    function resetAll() {
        'ABCDEFGHIJKLMN'.split('').forEach(n => p4State[n] = false);
        p4State.O=true; p4State.P=false;
        p4State.Q=true; p4State.R=false;
        p4Recalculate();
        p4Render();
    }

    p4Render();
    p4Recalculate();
    </script>
